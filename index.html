<!DOCTYPE html>
<html>
<head>
  <title>Simple Minecraft Web</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="info">
    <b>Simple Minecraft</b><br>
    Click the screen to start<br><br>
    WASD = move<br>
    Mouse = look<br>
    Space = jump<br>
    Left click = break block<br>
    Right click = place block<br>
    1-5 = choose block<br><br>
    Selected: <span id="selected">Grass</span>
  </div>

  <div id="crosshair">+</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
